# Render blueprint for Cloudwise Lab.
#
# Deploy:
#   1. Push this repo to GitHub.
#   2. In Render: New → Blueprint → connect the repo.
#   3. Set the secret env vars in the Render dashboard:
#        ANTHROPIC_API_KEY  — your real key
#        LAB_ADMIN_EMAILS   — comma-separated login emails that should see admin
#        LAB_SESSION_SECRET — generated automatically by the blueprint unless
#                             already present in the Render service
#   4. Add a custom domain: lab.cloudwise.academy → ALIAS the Render URL.
#   5. Run `npm run auth-smoke` against the deployed service before sharing it.
#
# Cost: starter web service is $7/mo. Bump to standard when you exceed
# ~30 concurrent students.

services:
  - type: web
    name: cloudwise-lab
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci --include=dev && npm run prepare-template && npm run build:web
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: "10000"
      - key: LAB_DATA_DIR
        value: /var/data
      - key: LAB_MODEL
        value: claude-sonnet-4-6
      # Set ANTHROPIC_API_KEY in the dashboard (sync: false so it's not
      # committed to the blueprint). LAB_SESSION_SECRET is generated by Render
      # if the service doesn't already have one.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LAB_ADMIN_EMAILS
        sync: false
      - key: LAB_SESSION_SECRET
        generateValue: true
    disk:
      name: lab-data
      mountPath: /var/data
      sizeGB: 10
